<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>しふとまとめれ～る</title>
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#0f0f22;--surface:#181830;--border:#2e2e50;
      --accent:#5588cc;--accent2:#cc4455;--accent3:#44aa66;--accent4:#cc8833;
      --text:#c8c8e0;--muted:#444466;--px:2px;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{min-height:100vh;font-family:'DotGothic16',monospace;background:var(--bg);color:var(--text);font-size:14px}

    body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,#ffffff06 1px,transparent 1px);background-size:16px 16px;pointer-events:none;z-index:0}
    *{position:relative;z-index:1}

    .app{max-width:480px;margin:0 auto;padding:16px;display:flex;flex-direction:column;gap:16px;min-height:100vh}
    
    header{display:flex;justify-content:space-between;align-items:center;padding:4px 0}
    h1{font-family:'Press Start 2P',monospace;font-size:12px;color:var(--accent);letter-spacing:-1px}
    
    .card{background:var(--surface);border:var(--px) solid var(--border);padding:12px;box-shadow:4px 4px 0 #000;image-rendering:pixelated}
    .card-title{font-size:11px;color:var(--muted);margin-bottom:8px;font-family:'Press Start 2P',monospace;display:flex;justify-content:space-between}

    /* 案内画面（元々あったログイン箱を、URL発行箱に変更） */
    #group-setup-view { display: block; }
    .welcome-text { font-size: 12px; color: var(--muted); margin-bottom: 12px; line-height: 1.6; }

    /* メインコンテンツ（初期は非表示） */
    #main-app-view { display: none; flex-direction: column; gap: 16px; }

    .input-row{display:flex;gap:8px;margin-bottom:8px}
    input[type="text"],input[type="number"],select{flex:1;background:#070715;border:var(--px) solid var(--border);color:#fff;padding:6px 8px;font-family:'DotGothic16',monospace;font-size:13px;border-radius:0;outline:none}
    input[type="text"]:focus,input[type="number"]:focus{border-color:var(--accent)}
    
    .btn{background:var(--accent);color:#000;border:var(--px) solid #fff;padding:6px 12px;font-family:'DotGothic16',monospace;font-size:12px;font-weight:bold;cursor:pointer;box-shadow:2px 2px 0 #000;display:inline-flex;align-items:center;justify-content:center;gap:4px;border-radius:0}
    .btn:active{transform:translate(2px,2px);box-shadow:0 0 0 #000}
    .btn-sm{padding:2px 6px;font-size:11px;box-shadow:1px 1px 0 #000}
    .btn-danger{background:var(--accent2);color:#fff}
    .btn-success{background:var(--accent3)}
    .btn-warning{background:var(--accent4)}

    .tabs{display:flex;gap:4px;margin-bottom:-2px}
    .tab{padding:6px 12px;font-size:12px;border:var(--px) solid var(--border);border-bottom:none;background:var(--bg);color:var(--muted);cursor:pointer}
    .tab.active{background:var(--surface);color:var(--accent);border-color:var(--border);font-weight:bold}
    
    .view{display:none}
    .view.active{display:block}

    .cal-ctrl{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
    .cal-title{font-weight:bold;font-size:14px;color:#fff}
    .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
    .gh{font-size:11px;color:var(--muted);text-align:center;padding:2px 0}
    .cell{background:#070715;border:1px solid var(--border);min-height:50px;padding:2px;display:flex;flex-direction:column;gap:2px}
    .cell-num{font-size:10px;color:var(--muted);line-height:1}
    .cell.today{border-color:var(--accent4)}
    .cell.today .cell-num{color:var(--accent4);font-weight:bold}
    .cell.other{opacity:0.2}

    .tag{font-size:9px;padding:1px 2px;color:#000;font-weight:bold;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-radius:1px}
    .tag-pending{background:none!important;border:1px dashed currentColor;color:inherit}

    .m-row{display:flex;justify-content:space-between;align-items:center;padding:6px;background:#070715;border:1px solid var(--border);margin-bottom:4px}
    .m-info{display:flex;align-items:center;gap:6px;font-size:13px}
    .m-color{width:8px;height:8px;border-radius:50%}

    .modal{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:100;padding:16px}
    .modal-body{background:var(--surface);border:var(--px) solid var(--border);box-shadow:6px 6px 0 #000;padding:16px;width:100%;max-width:360px;display:flex;flex-direction:column;gap:12px}
    
    .stat-row{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px dashed var(--border)}
    .stat-label{color:var(--muted)}
    .stat-value{font-weight:bold}

    #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--accent3);color:#000;padding:6px 12px;font-size:12px;font-weight:bold;border:var(--px) solid #fff;box-shadow:2px 2px 0 #000;display:none;z-index:200}
    #loading{position:fixed;inset:0;background:rgba(15,15,34,0.8);display:none;align-items:center;justify-content:center;z-index:150;font-family:'Press Start 2P',monospace;font-size:12px;color:var(--accent)}
  </style>
</head>
<body>

  <div class="app">
    <header>
      <h1>SHIFT MATOMERE~RU</h1>
      <div id="header-btn-zone" style="display:none;">
        <button class="btn btn-sm" onclick="openMypage()">マイページ</button>
      </div>
    </header>

    <div id="group-setup-view" class="card">
      <div class="card-title">GROUP SETUP</div>
      <p class="welcome-text">
        仲間内だけで共有する安全なシフト管理アプリです。<br>
        URLを知っている人のみアクセスできます。
      </p>
      <div id="create-action-box">
        <div class="input-row">
          <input type="text" id="new-group-name" placeholder="グループ名（英数字）">
          <button class="btn btn-success" onclick="generateSecureUrl()">URLを発行</button>
        </div>
      </div>
      <div id="url-result-box" style="display:none; margin-top:12px; padding-top:12px; border-top:1px dashed var(--border);">
        <p class="welcome-text" style="color:var(--accent3);">URLが作成されました！コピーして仲間に共有してください。</p>
        <input type="text" id="generated-url" readonly style="width:100%; margin-bottom:8px; color:var(--accent3);">
        <button class="btn" style="width:100%;" onclick="copyUrl()">URLをコピー</button>
      </div>
    </div>

    <div id="main-app-view">
      <div class="tabs">
        <div class="tab active" onclick="switchTab('cal')">カレンダー</div>
        <div class="tab" onclick="switchTab('mem')">メンバー (<span id="m-count">0</span>)</div>
      </div>

      <div id="view-cal" class="view active card" style="border-top:none">
        <div class="cal-ctrl">
          <button class="btn btn-sm" onclick="changeMonth(-1)">◀</button>
          <div class="cal-title" id="cal-title">2026年 06月</div>
          <button class="btn btn-sm" onclick="changeMonth(1)">▶</button>
        </div>
        <div class="grid" id="cal-grid"></div>
        <div id="salary-zone"></div>
      </div>

      <div id="view-mem" class="view card" style="border-top:none">
        <div class="card-title">MEMBER LIST</div>
        <div id="member-list" style="margin-bottom:12px"></div>
        
        <div class="card-title" style="margin-top:16px">ADD NEW MEMBER</div>
        <div class="input-row">
          <input type="text" id="add-name" placeholder="名前 (例: たなか)">
        </div>
        <div class="input-row">
          <input type="text" id="add-url" placeholder="ciftrのURL (https://ciftr.jp/...)">
          <button class="btn" onclick="addMember()">追加</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal" id="mypage-modal">
    <div class="modal-body">
      <div class="card-title" style="margin-bottom:0">MY PAGE <span style="float:right;cursor:pointer" onclick="closeMypage()">[X]</span></div>
      
      <div id="mypageLogin">
        <input type="text" id="myUserId" placeholder="マイページID (英数字6文字以上)" style="width:100%;margin-bottom:8px">
        <div style="display:flex;gap:8px">
          <button class="btn" style="flex:1" onclick="loginMypage()">ログイン</button>
          <button class="btn btn-warning" style="flex:1" onclick="showRegister()">新規登録</button>
        </div>
        <div id="register-zone" style="display:none;margin-top:12px;padding-top:12px;border-top:1px dashed var(--border)">
          <select id="reg-nickname" style="width:100%;margin-bottom:8px"></select>
          <button class="btn btn-success" style="width:100%" onclick="registerMypage()">登録を確定</button>
        </div>
      </div>

      <div id="mypageMain" style="display:none">
        <div style="font-size:12px;margin-bottom:8px">ユーザー: <span id="my-name-label" style="color:var(--accent);font-weight:bold"></span></div>
        <div class="input-row">
          <input type="number" id="my-wage" placeholder="時給">
          <input type="number" id="my-commute" placeholder="交通費/回">
        </div>
        <button class="btn btn-success" style="width:100%;margin-bottom:12px" onclick="saveMypage()">設定を保存</button>
        
        <div style="border-top:1px dashed var(--border);padding-top:12px">
          <div class="card-title" style="color:var(--accent4)">iCal SYNC</div>
          <input type="text" id="ical-url" readonly style="width:100%;font-size:11px;margin-bottom:6px;color:var(--accent4)">
          <button class="btn btn-sm" onclick="copyIcal()">iCalURLをコピー</button>
        </div>
        <button class="btn btn-danger btn-sm" style="margin-top:12px;width:100%" onclick="logoutMypage()">ログアウト</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>
  <div id="loading">LOADING...</div>

  <script>
    let currentGroupId = '';
    let members = [];
    let shiftResults = [];
    let myData = null;
    let viewDate = new Date();
    const COLORS = ['#5588cc','#cc4455','#44aa66','#cc8833','#aa66cc','#eeaa33','#33aaaa'];

    window.addEventListener('DOMContentLoaded', async () => {
      const params = new URLSearchParams(window.location.search);
      const g = params.get('g');
      
      if(g) {
        currentGroupId = g;
        document.getElementById('group-setup-view').style.display = 'none';
        document.getElementById('main-app-view').style.display = 'flex';
        document.getElementById('header-btn-zone').style.display = 'block';
        
        showLoading(true);
        await refreshData();
        showLoading(false);
      } else {
        document.getElementById('group-setup-view').style.display = 'block';
        document.getElementById('main-app-view').style.display = 'none';
        document.getElementById('header-btn-zone').style.display = 'none';
      }
    });

    function generateSecureUrl() {
      const name = document.getElementById('new-group-name').value.trim();
      if(!name) return alert('名前を入力してください');
      if(!/^[a-zA-Z0-9_-]+$/.test(name)) return alert('英数字のみ使えます');

      const rand = Math.random().toString(36).substring(2, 10);
      const secureId = `${name}-${rand}`;
      const url = `${window.location.origin}${window.location.pathname}?g=${secureId}`;
      
      document.getElementById('generated-url').value = url;
      document.getElementById('url-result-box').style.display = 'block';
    }

    function copyUrl() {
      const el = document.getElementById('generated-url');
      el.select();
      document.execCommand('copy');
      toast('URLをコピーしました！');
    }

    async function refreshData() {
      try {
        const res = await fetch(`/api/groups?groupId=${currentGroupId}`);
        const d = await res.json();
        members = d.members || [];
        document.getElementById('m-count').innerText = members.length;
        renderMembers();

        const sRes = await fetch(`/api/get-shifts?groupId=${currentGroupId}`);
        const sData = await sRes.json();
        shiftResults = sData.results || [];
        renderCalendar();

        const savedUid = localStorage.getItem('myUserId');
        if(savedUid) await autoLogin(savedUid);
      } catch(e) {
        console.error(e);
      }
    }

    async function addMember() {
      const name = document.getElementById('add-name').value.trim();
      const url = document.getElementById('add-url').value.trim();
      if(!name || !url) return alert('入力してください');
      
      showLoading(true);
      try {
        const r = await fetch(`/api/groups?groupId=${currentGroupId}&action=add`, {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({name, url})
        });
        if(!r.ok) { const e = await r.json(); throw new Error(e.error); }
        document.getElementById('add-name').value = '';
        document.getElementById('add-url').value = '';
        await refreshData();
        toast('追加しました！');
      } catch(e){ alert(e.message); }
      finally{ showLoading(false); }
    }

    function renderMembers() {
      const b = document.getElementById('member-list');
      b.innerHTML = '';
      if(members.length===0){ b.innerHTML='<div style="font-size:12px;color:var(--muted);text-align:center">無し</div>'; return; }
      members.forEach((m,i)=>{
        const c = COLORS[i % COLORS.length];
        b.innerHTML += `
          <div class="m-row">
            <div class="m-info"><div class="m-color" style="background:${c}"></div><b>${m.name}</b></div>
            <a href="${m.url}" target="_blank" style="font-size:11px;color:var(--accent);text-decoration:none">元リンク ↗</a>
          </div>`;
      });
    }

    function renderCalendar() {
      const grid = document.getElementById('cal-grid');
      grid.innerHTML = '';
      
      const y = viewDate.getFullYear();
      const m = viewDate.getMonth();
      document.getElementById('cal-title').innerText = `${y}年 ${String(m+1).padStart(2,'0')}月`;

      ['日','月','火','水','木','金','土'].forEach(w => {
        grid.innerHTML += `<div class="gh">${w}</div>`;
      });

      const first = new Date(y,m,1).getDay();
      const last = new Date(y,m+1,0).getDate();
      const pLast = new Date(y,m,0).getDate();

      for(let i=first-1;i>=0;i--){ createCell(grid, pLast-i, true); }
      for(let d=1;d<=last;d++){
        const today = new Date();
        const isToday = (today.getFullYear()===y && today.getMonth()===m && today.getDate()===d);
        const cell = createCell(grid, d, false, isToday);
        
        const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        
        shiftResults.forEach(r => {
          if(r.error) return;
          const c = COLORS[r.colorIdx % COLORS.length];
          
          (r.shifts||[]).filter(s=>s.date===dateStr).forEach(s=>{
            cell.innerHTML += `<div class="tag" style="background:${c}">${r.name}:${s.start}</div>`;
          });
          (r.pendingShifts||[]).filter(s=>s.date===dateStr).forEach(s=>{
            cell.innerHTML += `<div class="tag tag-pending" style="color:${c};border-color:${c}">[申]${s.start}</div>`;
          });
        });
      }
      
      const rem = (grid.children.length - 7) % 7;
      if(rem > 0) { for(let i=1;i<=(7-rem);i++){ createCell(grid, i, true); } }

      if(myData) calcSalary();
    }

    function createCell(g, num, isOther, isToday=false) {
      const c = document.createElement('div');
      c.className = `cell ${isOther?'other':''} ${isToday?'today':''}`;
      c.innerHTML = `<div class="cell-num">${num}</div>`;
      g.appendChild(c);
      return c;
    }

    function changeMonth(v) { viewDate.setMonth(viewDate.getMonth()+v); renderCalendar(); }
    
    function switchTab(t) {
      document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
      document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById('view-'+t).classList.add('active');
    }

    // ===== マイページ処理 =====
    function openMypage() { document.getElementById('mypage-modal').style.display='flex'; }
    function closeMypage() { document.getElementById('mypage-modal').style.display='none'; }
    
    async function autoLogin(uid) {
      try {
        const r = await fetch(`/api/mypage?userId=${uid}`);
        if(r.ok) { myData = await r.json(); statusLoggedIn(); }
      }catch(e){}
    }

    function loginMypage() {
      const uid = document.getElementById('myUserId').value.trim();
      if(!uid) return;
      showLoading(true);
      fetch(`/api/mypage?userId=${uid}`)
        .then(r => { if(!r.ok) throw new Error(); return r.json(); })
        .then(d => { myData = d; localStorage.setItem('myUserId', uid); statusLoggedIn(); renderCalendar(); })
        .catch(()=>alert('ユーザーが見つかりません'))
        .finally(()=>showLoading(false));
    }

    function showRegister() {
      const sel = document.getElementById('reg-nickname'); sel.innerHTML = '';
      members.forEach(m=>{ sel.innerHTML += `<option value="${m.name}">${m.name}</option>`; });
      document.getElementById('register-zone').style.display='block';
    }

    function registerMypage() {
      const uid = document.getElementById('myUserId').value.trim();
      const nick = document.getElementById('reg-nickname').value;
      if(!uid || uid.length < 6) return alert('6文字以上必要です');
      
      showLoading(true);
      fetch(`/api/mypage?action=register`, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({userId:uid, nickname:nick, groupId:currentGroupId})
      })
      .then(r=>r.json())
      .then(d=>{ myData=d; localStorage.setItem('myUserId', uid); statusLoggedIn(); renderCalendar(); toast('登録完了！'); })
      .catch(()=>alert('登録失敗'))
      .finally(()=>showLoading(false));
    }

    function statusLoggedIn() {
      document.getElementById('mypageLogin').style.display='none';
      document.getElementById('mypageMain').style.display='block';
      document.getElementById('my-name-label').innerText = myData.nickname;
      document.getElementById('my-wage').value = myData.hourlyWage || '';
      document.getElementById('my-commute').value = myData.commute || '';
      document.getElementById('ical-url').value = `${window.location.protocol}//${window.location.host}/api/cal?g=${currentGroupId}&name=${encodeURIComponent(myData.nickname)}`;
    }

    function saveMypage() {
      const wage = document.getElementById('my-wage').value;
      const comm = document.getElementById('my-commute').value;
      showLoading(true);
      fetch(`/api/mypage?action=update`, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({userId:myData.userId, hourlyWage:wage, commute:comm})
      })
      .then(r=>r.json())
      .then(d=>{ myData=d; renderCalendar(); toast('保存しました'); closeMypage(); })
      .catch(()=>alert('エラー'))
      .finally(()=>showLoading(false));
    }

    function calcSalary() {
      if(!myData) return;
      const res = shiftResults.find(r=>r.name===myData.nickname);
      if(!res || !res.shifts) return;

      const y = viewDate.getFullYear();
      const m = viewDate.getMonth()+1;
      const pref = `${y}-${String(m).padStart(2,'0')}`;
      const target = res.shifts.filter(s=>s.date.startsWith(pref));

      let hours = 0;
      target.forEach(s=>{
        const [sh,sm] = s.start.split(':').map(Number);
        const [eh,em] = s.end.split(':').map(Number);
        let diff = (new Date(2000,0,1,eh,em) - new Date(2000,0,1,sh,sm)) / 3600000;
        if(diff<0) diff += 24;
        hours += diff;
      });

      const base = Math.round(hours * (myData.hourlyWage||0));
      const comm = target.length * (myData.commute||0);
      const total = base + comm;

      // 元のClaudeの仕様通りのシンプルな給与レポート枠
      document.getElementById('salary-zone').innerHTML = `
        <div style="margin-top:12px;padding-top:12px;border-top:1px dashed var(--border)">
          <div class="stat-row"><span class="stat-label">労働時間</span><span class="stat-value">${hours.toFixed(1)}h</span></div>
          <div class="stat-row"><span class="stat-label">勤務日数</span><span class="stat-value">${target.length}日</span></div>
          <div class="stat-row"><span class="stat-label">基本給</span><span class="stat-value">¥${base.toLocaleString()}</span></div>
          <div class="stat-row"><span class="stat-label">交通費</span><span class="stat-value">¥${comm.toLocaleString()}</span></div>
          <div class="stat-row" style="border-bottom:none"><span class="stat-label" style="font-weight:bold;color:var(--text);">合計</span><span class="stat-value" style="color:var(--accent3);font-size:14px;">¥${total.toLocaleString()}</span></div>
        </div>
      `;
    }

    function copyIcal() {
      const el = document.getElementById('ical-url'); el.select(); document.execCommand('copy'); toast('コピーしました！');
    }

    function logoutMypage() {
      localStorage.removeItem('myUserId'); myData = null;
      document.getElementById('mypageMain').style.display='none';
      document.getElementById('mypageLogin').style.display='block';
      document.getElementById('myUserId').value='';
      document.getElementById('salary-zone').innerHTML = '';
      closeMypage();
    }

    function showLoading(v) { document.getElementById('loading').style.display = v ? 'flex' : 'none'; }
    function toast(m) {
      const t = document.getElementById('toast'); t.innerText = m; t.style.display='block';
      setTimeout(()=>{t.style.display='none'}, 2000);
    }
  </script>
</body>
</html>
